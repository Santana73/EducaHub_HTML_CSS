<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/x-icon" href="./assets/Logo.png"/>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EducaHub | Entrar</title>
<meta name="description" content="Acesse sua conta no EducaHub para continuar aprendendo matemática com lições, exercícios e jogos." />
<link rel="stylesheet" href="styles/base.css" />
<link rel="stylesheet" href="styles/auth.css" />
</head>
<body>
<header class="site-header">
  <div class="container inner">
    <a class="logo" href="index.html"><img src="assets/logo-educahub.png" alt="EducaHub logo" /></a>
    <nav class="desktop">
      <a href="index.html#inicio">Início</a>
      <a href="index.html#sobre">Sobre</a>
      <a href="index.html#servicos">Serviços</a>
      <a href="index.html#contato">Contatos</a>
      <a href="voluntario.html">Voluntário</a>
    </nav>
    <a class="btn-primary login-btn" href="login.html">Entrar</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile" id="mobileMenu">
    <a href="index.html#inicio">Início</a>
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#servicos">Serviços</a>
    <a href="index.html#contato">Contatos</a>
    <a href="voluntario.html">Voluntário</a>
    <a class="login-link" href="login.html">Entrar</a>
  </div>
</header>

<main class="auth-wrap">
  <div class="blob1"></div>
  <div class="blob2"></div>
  <svg class="star" viewBox="0 0 100 100"><polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="currentColor"/></svg>

  <div class="auth-card animate-reveal-up" id="authCard">
    <a class="auth-back" href="index.html">← Voltar</a>
    
    <!-- LOGIN FORM -->
    <div id="loginForm">
      <h1>Entrar</h1>
      <p class="sub">Acesse sua conta</p>
      <form class="auth-form" onsubmit="event.preventDefault()">
        <div class="input-group">
          <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" placeholder="Digite seu e-mail" />
        </div>
        <div class="input-group">
          <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" class="with-toggle" id="pwInput" placeholder="Digite sua senha" />
          <button type="button" class="toggle" id="pwToggle" aria-label="Mostrar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="forgot-row"><a class="link" href="#" id="forgotBtn">Esqueceu a senha?</a></div>
        <button type="submit" class="btn-dark">Prosseguir</button>
      </form>
      <p class="auth-foot">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>

    <!-- RESET PASSWORD FORM -->
    <div id="resetForm" style="display: none;">
      <h1>Redefinir Senha</h1>
      <p class="sub">Digite seu e-mail para redefinir sua senha</p>
      <form class="auth-form" onsubmit="event.preventDefault()">
        <div class="input-group">
          <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" id="resetEmail" placeholder="Digite seu e-mail" />
        </div>
        <button type="submit" class="btn-dark" id="resetBtn">Enviar Link de Redefinição</button>
      </form>
      <p class="auth-foot"><a class="link" href="#" id="backBtn">← Voltar ao login</a></p>
    </div>
  </div>
</main>

<script>
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('open');
  });
  
  const pwInput = document.getElementById('pwInput');
  document.getElementById('pwToggle').addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  // Reset Password Modal
  const loginForm = document.getElementById('loginForm');
  const resetForm = document.getElementById('resetForm');
  const forgotBtn = document.getElementById('forgotBtn');
  const backBtn = document.getElementById('backBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resetEmail = document.getElementById('resetEmail');

  forgotBtn.addEventListener('click', (e) => {
    e.preventDefault();
    loginForm.style.display = 'none';
    resetForm.style.display = 'block';
  });

  backBtn.addEventListener('click', (e) => {
    e.preventDefault();
    resetForm.style.display = 'none';
    loginForm.style.display = 'block';
    resetEmail.value = '';
  });

  resetBtn.addEventListener('click', () => {
    const email = resetEmail.value;
    if (!email) {
      alert('Por favor, digite seu e-mail');
      return;
    }
    alert(`Link de redefinição enviado para ${email}`);
    resetEmail.value = '';
    resetForm.style.display = 'none';
    loginForm.style.display = 'block';
  });
</script>
</body>
</html>
